            font-family: 'Arial', 'Impact', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: bgFlash 0.5s infinite;
        }
        @keyframes bgFlash {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }
        .card {
            background: rgba(0,0,0,0.85);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 50px rgba(255,0,0,0.8);
            border: 5px solid gold;
            backdrop-filter: blur(5px);
        }
        h1 {
            font-size: 48px;
            background: linear-gradient(45deg, red, yellow, lime);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px black;
            animation: shake 0.3s infinite;
        }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-3px); }
            75% { transform: translateX(3px); }
        }
        .robux-counter {
            font-size: 70px;
            font-weight: bold;
            color: lime;
            background: black;
            display: inline-block;
            padding: 20px;
            border-radius: 50px;
            margin: 20px;
            font-family: monospace;
            border: 3px solid white;
        }
        button {
            background: red;
            color: white;
            font-size: 40px;
            padding: 20px 40px;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 20px orange;
            transition: 0.1s linear;
            margin-top: 20px;
        }
        button:hover {
            background: darkred;
            transform: scale(1.05);
            box-shadow: 0 0 40px red;
        }
        .progress-bar {
            width: 80%;
            margin: 30px auto;
            background: #222;
            border-radius: 30px;
            height: 30px;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, lime, yellow, red);
            transition: width 0.05s linear;
        }
        .fake-status {
            color: white;
            font-size: 20px;
            margin-top: 15px;
            background: black;
            display: inline-block;
            padding: 10px;
            border-radius: 20px;
        }
        video { display: none; }
        #insulte { font-size: 28px; color: orange; margin-top: 20px; font-weight: bold; }
    </style>
</head>

</script>
